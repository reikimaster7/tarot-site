<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>🔮 タロット占い 🔮</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at center, #1a002f, #000);
  color: white;
  font-family: sans-serif;
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 36px;
  text-shadow:0 0 15px #b388ff;
}

button {
  padding: 12px 25px;
  font-size: 18px;
  cursor: pointer;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, #6a00ff, #ff00cc);
  color: white;
  margin: 10px;
}

button:hover { transform: scale(1.1); }

#result {
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
  margin-top: 20px;
}

.card {
  width: 140px;
  cursor: pointer;
}

.card img {
  width: 100%;
  border-radius: 10px;
  opacity: 0;
  transform: rotateY(90deg);
  transition: 0.6s;
}

.card.show img {
  opacity: 1;
  transform: rotateY(0deg);
}

.reversed {
  transform: rotateY(0deg) rotate(180deg);
}

.summary {
  margin-top: 30px;
  max-width: 500px;
  margin-inline: auto;
  line-height: 1.8;
}

/* モーダル */
#modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

#modalContent {
  background:#1a002f;
  padding:20px;
  border-radius:10px;
  max-width:300px;
}

#modal img { width:150px; }
</style>
</head>

<body>

<h1>🔮 タロット占い 🔮</h1>
<p>あなたの運命を占います</p>

<button onclick="drawThree()">占う</button>

<div id="result"></div>

<!-- モーダル -->
<div id="modal">
  <div id="modalContent">
    <img id="modalImg">
    <h2 id="modalName"></h2>
    <p id="modalText"></p>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
const cards = [
  {
    name:"愚者",
    img:"images/major_01_fool.png",
    up:"新しい始まりの時です。恐れず一歩踏み出せば道が開けます。",
    rev:"軽率な行動に注意。慎重に判断する必要があります。"
  },
  {
    name:"恋人",
    img:"images/major_07_lovers.png",
    up:"愛と調和。大切な選択のタイミングです。",
    rev:"すれ違いや迷いが生じやすい時期です。"
  },
  {
    name:"太陽",
    img:"images/major_20_sun.png",
    up:"成功と幸福。すべてがうまくいく兆し。",
    rev:"結果が出るまでに少し時間がかかります。"
  }
];

// シャッフル
function shuffle(array){
  return array.sort(()=>0.5-Math.random());
}

// 総合リーディング
function generateReading(draw){
  return `
あなたは今、大きな転機の中にいます。

過去の「${draw[0].name}」はこれまでの経験を示しています。
現在の「${draw[1].name}」は今のあなたの状態です。
未来の「${draw[2].name}」はこれから訪れる変化を表しています。

焦らず、自分の直感を信じて進むことで道は開けるでしょう。
`;
}

// 占う
function drawThree(){
  const result = document.getElementById("result");
  result.innerHTML = "<p>🔮 シャッフル中...</p>";

  setTimeout(()=>{

    result.innerHTML="";
    const shuffled = shuffle([...cards]);
    const draw = shuffled.slice(0,3);
    const positions = ["過去","現在","未来"];

    draw.forEach((card,index)=>{
      const isReversed = Math.random()<0.5;

      const div = document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <h3>${positions[index]}</h3>
        <img src="${card.img}" class="${isReversed?'reversed':''}">
        <p>${card.name}</p>
      `;

      result.appendChild(div);

      setTimeout(()=>div.classList.add("show"), 500*index);

      div.onclick = ()=>{
        openModal(card, isReversed);
      }
    });

    // 総合結果
    const summary = document.createElement("div");
    summary.className="summary";
    summary.innerHTML = generateReading(draw);
    result.appendChild(summary);

    result.scrollIntoView({behavior:"smooth"});

  },1000);
}

// モーダル
function openModal(card, isReversed){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src=card.img;
  document.getElementById("modalName").textContent=card.name;
  document.getElementById("modalText").textContent =
    isReversed ? card.rev : card.up;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
