<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>🔮 タロット占い 🔮</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at center, #1a002f, #000);
  color: white;
  font-family: sans-serif;
  text-align: center;
  padding: 20px;
}

h1 { text-shadow:0 0 15px #b388ff; }

button {
  padding: 12px 25px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg, #6a00ff, #ff00cc);
  color: white;
  cursor: pointer;
}

#result {
  display: flex;
  justify-content: center;
  gap: 15px;
  flex-wrap: wrap;
  margin-top: 20px;
}

.card img {
  width: 120px;
  opacity: 0;
  transform: rotateY(90deg);
  transition: 0.6s;
}

.card.show img {
  opacity: 1;
  transform: rotateY(0);
}

/* 🔥 逆位置（これが重要） */
.card.show img.reversed {
  transform: rotateY(0) rotate(180deg);
}

.summary {
  margin-top: 30px;
  max-width: 500px;
  line-height: 1.8;
}

/* モーダル */
#modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

#modalContent {
  background:#1a002f;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>🔮 タロット占い 🔮</h1>
<button onclick="drawThree()">占う</button>

<div id="result"></div>

<!-- モーダル -->
<div id="modal">
  <div id="modalContent">
    <img id="modalImg">
    <h2 id="modalName"></h2>
    <p id="modalText"></p>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>

// カード
const cards = [
{name:"愚者", img:"images/major_01_fool.png"},
{name:"魔術師", img:"images/major_02_magician.png"},
{name:"女教皇", img:"images/major_03_high_priestess.png"},
{name:"女帝", img:"images/major_04_empress.png"},
{name:"皇帝", img:"images/major_05_emperor.png"},
{name:"教皇", img:"images/major_06_hierophant.png"},
{name:"恋人", img:"images/major_07_lovers.png"},
{name:"戦車", img:"images/major_08_chariot.png"},
{name:"力", img:"images/major_09_strength.png"},
{name:"隠者", img:"images/major_10_hermit.png"},
{name:"運命の輪", img:"images/major_11_wheel.png"},
{name:"正義", img:"images/major_12_justice.png"},
{name:"吊るされた男", img:"images/major_13_hanged.png"},
{name:"死神", img:"images/major_14_death.png"},
{name:"節制", img:"images/major_15_temperance.png"},
{name:"悪魔", img:"images/major_16_devil.png"},
{name:"塔", img:"images/major_17_tower.png"},
{name:"星", img:"images/major_18_star.png"},
{name:"月", img:"images/major_19_moon.png"},
{name:"太陽", img:"images/major_20_sun.png"},
{name:"審判", img:"images/major_21_judgement.png"},
{name:"世界", img:"images/major_22_world.png"}
];

// 正位置
const meanings = {
"愚者":"新しい始まり。自由な発想で進むと運が開けます。",
"魔術師":"行動力とチャンス。あなたには実現する力があります。",
"恋人":"愛と選択のタイミングです。",
"太陽":"成功と幸福。すべてが良い方向へ進みます。"
};

// 逆位置
const reversedMeanings = {
"愚者":"軽率な行動に注意。慎重な判断が必要です。",
"魔術師":"自信のなさがチャンスを逃す原因です。",
"恋人":"すれ違いや迷いが生じています。",
"太陽":"成功は近いが少し遅れが出ます。"
};

// シャッフル
function shuffle(arr){
  return arr.sort(()=>0.5-Math.random());
}

// 総合
function generateReading(draw){
  return `
過去：${draw[0].name}<br>
現在：${draw[1].name}<br>
未来：${draw[2].name}<br><br>
焦らず進むことで道が開けます。
`;
}

// 占い
function drawThree(){
  const result = document.getElementById("result");
  result.innerHTML = "🔮 シャッフル中...";

  setTimeout(()=>{
    result.innerHTML="";
    const draw = shuffle([...cards]).slice(0,3);
    const positions = ["過去","現在","未来"];

    draw.forEach((card,index)=>{
      const isReversed = Math.random() < 0.5;

      console.log(card.name, isReversed); // ← 修正済み

      const div = document.createElement("div");
      div.className="card";

      const text = isReversed
        ? reversedMeanings[card.name] || "解釈準備中"
        : meanings[card.name] || "解釈準備中";

      div.innerHTML=`
        <h3>${positions[index]}</h3>
        <img src="${card.img}" class="${isReversed?'reversed':''}">
        <p>${card.name}</p>
        <p style="color:${isReversed ? '#ff6b6b' : '#6bffb3'}">
          ${isReversed ? "🔻逆位置" : "🔺正位置"}
        </p>
        <p>${text}</p>
      `;

      result.appendChild(div);

      setTimeout(()=>div.classList.add("show"), 500*index);

      div.onclick = ()=>{
        openModal(card, isReversed);
      }
    });

    const summary = document.createElement("div");
    summary.className="summary";
    summary.innerHTML = generateReading(draw);
    result.appendChild(summary);

  },1000);
}

// モーダル
function openModal(card, isReversed){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src=card.img;
  document.getElementById("modalName").textContent=card.name;

  document.getElementById("modalText").textContent =
    isReversed
      ? reversedMeanings[card.name]
      : meanings[card.name];
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
